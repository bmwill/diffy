name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  CI: 1

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly, 1.75.0]

    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install ${{ matrix.rust }} --profile minimal
      - run: cargo +${{ matrix.rust }} check --all-targets --all-features
      - run: cargo +${{ matrix.rust }} test

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features
      - run: cargo doc --no-deps --all-features

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  replay:
    strategy:
      matrix:
        include:
          - name: diffy
            repo_url: ''
            commits: '0'
          - name: golang/go
            repo_url: https://github.com/golang/go
            commits: '2000'
          - name: git/git
            repo_url: https://github.com/git/git
            commits: '1000'
          - name: rust-lang/rust
            repo_url: https://github.com/rust-lang/rust
            commits: '50'
          - name: torvalds/linux
            repo_url: https://github.com/torvalds/linux
            commits: '40'
          - name: llvm/llvm-project
            repo_url: https://github.com/llvm/llvm-project
            commits: '50'
    name: replay (${{ matrix.name }})
    uses: ./.github/workflows/replay.yml
    with:
      name: ${{ matrix.name }}
      repo_url: ${{ matrix.repo_url }}
      commits: ${{ matrix.commits }}
